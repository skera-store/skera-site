<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKERA | ШХЕРА — Скандинавский дизайн</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arsenal:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arsenal', sans-serif;
            background-color: #D9D2C9; /* ФИРМЕННЫЙ ЦВЕТ ФОНА */
            color: #2F3538; /* ФИРМЕННЫЙ ЦВЕТ ТЕКСТА */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-container {
            margin-bottom: -15px; /* Максимально прижимаем камень к тексту */
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            transform: translateX(-1.3%); /* СМЕЩЕНО ЕЩЕ НА 0.3% ВЛЕВО (ИТОГО -1.3%) */
        }

        .logo-img {
            width: 120px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 0px; 
            margin-bottom: 10px;
            color: #2F3538;
            width: 100%;
            text-align: center;
        }

        .subtitle {
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            margin-bottom: 40px;
            color: #2F3538;
            opacity: 0.8;
            text-transform: lowercase;
            font-style: italic;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
        }

        .btn {
            display: inline-block;
            width: auto;
            min-width: 180px;
            padding: 12px 30px;
