<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKERA | ШХЕРА — Скандинавский дизайн</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arsenal:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arsenal', sans-serif;
            background-color: #F4F3EF;
            color: #2B2D2F;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* Строгое выравнивание всех элементов по центру */
        }

        .logo-container {
            margin-bottom: 5px; /* Минимальный отступ до текста */
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .logo-img {
            width: 120px;
            height: auto;
            display: block;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 400; /* Обычный шрифт, не жирный */
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 15px;
            color: #1A1C1E;
            width: 100%;
        }

        .subtitle {
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            margin-bottom: 40px;
            color: #606468;
            text-transform: lowercase;
            font-style: italic; /* Слоган наклонным шрифтом */
        }

        .links-container {
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрируем сами плашки кнопок */
            gap: 15px;
            margin-bottom: 40px;
            width: 100%;
        }

        .btn {
            display: inline-block;
            width: auto; /* Убираем растягивание на всю ширину */
            min-width: 180px; /* Задаем одинаковую минимальную ширину, чтобы кнопки смотрелись симметрично */
            padding: 12px 30px; /* Комфортные отступы внутри плашки */
            background-color: #2B2D2F;
            color: #F4F3EF;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1.05rem;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            border: 1px solid #2B2D2F;
        }

        .btn:hover {
            background-color: transparent;
            color: #2B2D2F;
        }

        footer {
            font-size: 0.85rem;
            color: #8A8E92;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo_site.svg" alt="SKERA Логотип" class="logo-img">
        </div>

        <h1>SKERA ⤊ ШХЕРА</h1>
        
        <div class="subtitle">север в доме. скоро.</div>

        <div class="links-container">
            <a href="https://vk.ru/skera.store" target="_blank" class="btn">ВКОНТАКТЕ</a>
            <a href="https://t.me/skera_store" target="_blank" class="btn">TELEGRAM</a>
        </div>

        <footer>
            &copy; 2026 SKERA | ШХЕРА. Все права защищены.
        </footer>
    </div>

</body>
</html>
