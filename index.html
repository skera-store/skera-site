<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKERA ⤊ ШХЕРА — север в доме</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arsenal:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Arsenal", sans-serif;
            background-color: #D9D2C9; /* Скандинавский айвори */
            color: #2F3538; /* Мокрая скала */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
        }
        /* Блок для рисунка логотипа (камень с лентой реки) */
        .logo-img {
            width: 150px; /* Оптимальный размер для графики */
            height: auto;
            margin-bottom: 24px;
        }
        /* Текстовое начертание бренда — плотное, без лишних пробелов */
        .brand-name {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        /* Слоган */
        .slogan {
            font-size: 18px;
            font-style: italic;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 45px;
        }
        .description {
            font-size: 18px;
            line-height: 1.7;
            margin-bottom: 45px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            max-width: 320px;
            margin: 0 auto;
        }
        .btn {
            display: block;
            padding: 16px 20px;
            border: 1px solid #2F3538;
            border-radius: 0;
            color: #2F3538;
            text-decoration: none;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background-color: #6F7B6A; /* Наведение: Северный мох */
            border-color: #6F7B6A;
            color: #D9D2C9;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo_site.svg" alt="SKERA Логотип" class="logo-img">
        
        <div class="brand-name">SKERA ⤊ ШХЕРА</div>
        
        <div class="slogan">север в доме</div>
        
        <div class="description">
            Пространство скандинавского дизайна, декора и предметов интерьера.<br>Скоро открытие.
        </div>

        <div class="links">
            <a href="https://instagram.com/skera_store" target="_blank" class="btn">Instagram</a>
            <a href="https://t.me/skera_store" target="_blank" class="btn">Telegram</a>
            <a href="https://vk.com/skera_store" target="_blank" class="btn">ВКонтакте</a>
            <a href="https://threads.net/@skera_store" target="_blank" class="btn">Threads</a>
        </div>
    </div>

</body>
</html>
